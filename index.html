<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Global Portfolio v2.1.0</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        :root { --primary: #0064e6; --success: #28a745; --danger: #dc3545; --bg: #f4f7f9; --card-bg: #ffffff; --text: #333333; --border: #eeeeee; --overlay: rgba(0, 0, 0, 0.5); }
        [data-theme="dark"] { --bg: #0f172a; --card-bg: #1e293b; --text: #f1f5f9; --border: #334155; --overlay: rgba(0, 0, 0, 0.7); }
        
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: var(--text); transition: 0.3s; }
        .container { max-width: 1350px; margin: auto; background: var(--card-bg); padding: 25px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); }
        
        .header-flex { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .nav-btns { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        
        .theme-toggle { background: #64748b; color: white; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: bold; }
        select { padding: 8px; border-radius: 8px; background: var(--card-bg); color: var(--text); border: 1px solid var(--border); }
        
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .card { padding: 25px; background: rgba(0,100,230,0.03); border-radius: 16px; border: 1px solid var(--border); text-align: center; }
        .card strong { font-size: 24px; display: block; margin: 5px 0; }
        .card span { font-size: 12px; color: #64748b; font-weight: 600; text-transform: uppercase; }

        .dashboard-grid { display: grid; grid-template-columns: 1fr 400px; gap: 30px; margin-bottom: 20px; align-items: start; }
        .table-wrapper { width: 100%; overflow-x: auto; border: 1px solid var(--border); border-radius: 16px; background: var(--card-bg); }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { background: rgba(0,0,0,0.02); padding: 18px; font-size: 11px; text-transform: uppercase; text-align: left; color: #64748b; cursor: pointer; }
        td { padding: 18px; border-bottom: 1px solid var(--border); font-size: 14px; }
        
        /* NEW: Enforced Visibility for Laptop Screens */
        .chart-card { 
            background: var(--card-bg); 
            border: 1px solid var(--border); 
            border-radius: 16px; 
            padding: 25px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            min-height: 480px !important; 
            height: 480px;
            display: block !important;
            visibility: visible !important;
        }
        .chart-wrapper { position: relative; height: 380px; width: 100%; }

        #auth-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .google-btn { background: #fff; color: #444; border: 1px solid #ddd; padding: 12px 24px; border-radius: 8px; font-weight: 600; display: flex; align-items: center; gap: 12px; cursor: pointer; }
        
        @media (max-width: 1150px) { .dashboard-grid { grid-template-columns: 1fr; } .chart-card { min-height: auto; height: auto; } }
    </style>
</head>
<body>

<script>
    // Immediate Theme Apply
    document.documentElement.setAttribute('data-theme', localStorage.getItem('theme-preference') || 'light');
</script>

<div id="auth-screen">
    <h1>📊 Portfolio Tracker</h1>
    <button class="google-btn" onclick="login()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" height="20"> Sign in with Google
    </button>
</div>

<div id="main-app" class="container" style="display:none;">
    <div class="header-flex">
        <h1>📊 Global Portfolio <span id="sync-status" style="font-size: 10px; color: #94a3b8;">● Offline</span></h1>
        <div class="nav-btns">
            <button class="theme-toggle" onclick="toggleTheme()">🌓 Mode</button>
            <button class="btn" style="background:#ef4444; font-size: 12px;" onclick="logout()">🚪 Exit</button>
        </div>
    </div>

    <div class="summary-grid">
        <div class="card"><span>Invested</span><strong id="totalInvested">0</strong></div>
        <div class="card"><span>Value</span><strong id="totalValue">0</strong></div>
        <div class="card"><span>PnL</span><strong id="dailyPnL">0</strong><small id="dailyPnLPercent">0%</small></div>
        <div class="card"><span>Growth</span><strong id="totalGrowth">0%</strong></div>
    </div>

    <div class="dashboard-grid">
        <div class="table-wrapper">
            <div style="padding: 15px;">
                <input type="text" id="searchInput" placeholder="🔍 Search..." onkeyup="render()" style="width:100%; max-width:300px;">
            </div>
            <table>
                <thead>
                    <tr><th>Asset</th><th>Price</th><th>Holdings</th><th>Value</th><th>PnL</th><th>%</th></tr>
                </thead>
                <tbody id="portfolioBody"></tbody>
            </table>
        </div>

        <div class="chart-card">
            <h4 style="text-align:center; margin-bottom: 15px;">Asset Allocation</h4>
            <div class="chart-wrapper">
                <canvas id="allocationChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDq8E_O1Ie5D6T47O1eDA0kcDKZc9IOU6E",
        authDomain: "my-crypto-portfolio-98e37.firebaseapp.com",
        projectId: "my-crypto-portfolio-98e37",
        storageBucket: "my-crypto-portfolio-98e37.firebasestorage.app",
        databaseURL: "https://my-crypto-portfolio-98e37-default-rtdb.firebaseio.com/",
        messagingSenderId: "186953471395",
        appId: "1:186953471395:web:f1135450c5a7ffbdcd7616",
        measurementId: "G-C56LZE9K04"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();
    const provider = new firebase.auth.GoogleAuthProvider();

    let trades = [], assetMetadata = {}, myChart = null;

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            db.ref('users/' + user.uid + '/trades').on('value', s => {
                trades = s.val() || [];
                fetchPrices();
            });
        }
    });

    function login() { auth.signInWithPopup(provider); }
    function logout() { auth.signOut().then(() => location.reload()); }

    async function fetchPrices() {
        try {
            const res = await fetch('https://api.binance.com/api/v3/ticker/24hr');
            const data = await res.json();
            data.forEach(t => {
                if (t.symbol.endsWith('USDT')) {
                    const base = t.symbol.replace('USDT', '');
                    assetMetadata[base] = { price: parseFloat(t.lastPrice), openUTC: parseFloat(t.openPrice) };
                }
            });
            render();
        } catch(e) { console.error(e); }
    }

    function render() {
        const tbody = document.getElementById('portfolioBody');
        tbody.innerHTML = '';
        let tVal = 0, chartData = {};

        trades.forEach(t => {
            const sym = t.id.toUpperCase();
            const meta = sym === 'USDT' ? { price: 1.0 } : (assetMetadata[sym] || { price: 0 });
            const val = t.amount * meta.price;
            tVal += val;
            chartData[sym] = (chartData[sym] || 0) + val;

            tbody.innerHTML += `<tr><td>${sym}</td><td>${meta.price.toFixed(2)}</td><td>${t.amount}</td><td>${val.toFixed(0)}</td><td>-</td><td>-</td></tr>`;
        });

        document.getElementById('totalValue').innerText = "$" + tVal.toLocaleString();
        
        // Use a timeout to ensure canvas is painted before Chart.js tries to grab it
        setTimeout(() => {
            updateModernChart(Object.keys(chartData), Object.values(chartData), "$" + Math.round(tVal).toLocaleString());
        }, 100);
    }

    function updateModernChart(labels, values, centerTotal) {
        const canvas = document.getElementById('allocationChart');
        if (!canvas) return;
        
        if (myChart) myChart.destroy();
        
        const ctx = canvas.getContext('2d');
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: labels,
                datasets: [{
                    data: values,
                    backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#06b6d4'],
                    borderWidth: 2,
                    borderRadius: 5,
                    spacing: 5
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                cutout: '70%',
                plugins: {
                    legend: { position: 'bottom', labels: { boxWidth: 12, padding: 15 } }
                }
            }
        });
    }

    function toggleTheme() {
        const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme-preference', next);
    }
</script>
</body>
</html>
